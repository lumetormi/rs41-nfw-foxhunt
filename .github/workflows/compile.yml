name: RS41-NFW Firmware Compiler
on:
  workflow_dispatch:
    inputs:
      pcb_model:
        description: 'Select the Sonde PCB Model'
        required: true
        default: 'RSM4x4'
        type: choice
        options:
          - RSM4x4
          - RSM4x2
      foxHuntSecondaryMode:
        description: 'Alternative foxhunt mode with transmissions at different power levels'
        type: boolean
        default: false
      foxHuntFmMelody:
        description: 'Transmit FM Melody'
        type: boolean
        default: true
      foxHuntCwTone:
        description: 'Transmit 10s CW Tone (instead of melody)'
        type: boolean
        default: false
      foxHuntMorseMarker:
        description: 'Transmit Morse Marker after melody'
        type: boolean
        default: true
      foxMorseMsg:
        description: 'Morse Code Message'
        type: string
        default: 'N0CALL N0CALL FOX'
      foxHuntLowVoltageAdditionalMarker:
        description: 'Send extra marker when battery is low'
        type: boolean
        default: true
      foxMorseMsgVbat:
        description: 'Low Battery Morse Message'
        type: string
        default: 'N0CALL LOW BATTERY'
      foxHuntFrequency:
        description: 'TX Frequency (MHz)'
        type: string
        default: '434.500'
      foxHuntTransmissionDelay:
        description: 'Delay between TX cycles (ms)'
        type: string
        default: '0'
      foxHuntRadioPower:
        description: 'TX Power index 1 (1mW) - 7 (100mW)'
        type: string
        default: '5'

jobs:
  compile_firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Cache Arduino Core Toolchain
        id: cache-arduino
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15/packages
            ~/.arduino15/package_stmicroelectronics_index.json
          key: ${{ runner.os }}-stm32-core-v1

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sudo BINDIR=/usr/local/bin sh

      - name: Install STM32 Boards Platform
        if: steps.cache-arduino.outputs.cache-hit != 'true'
        run: |
          arduino-cli config init
          STM32_URL="https://github.com/stm32duino/BoardManagerFiles/raw/main/package_stmicroelectronics_index.json"
          arduino-cli core update-index --additional-urls "$STM32_URL"
          arduino-cli core install STMicroelectronics:stm32 --additional-urls "$STM32_URL"

      - name: Dynamically Update CONFIG.h
        run: |
          CONFIG_FILE="./rs41-nfw_sonde-firmware/CONFIG.h"
          
          # Read workflow inputs, falling back to defaults if triggered by push/PR
          FOX_MODE="${{ github.event.inputs.foxHuntMode || 'true' }}"
          FOX_SECOND_MODE="${{ github.event.inputs.foxHuntSecondaryMode || 'false' }}"
          FM_MELODY="${{ github.event.inputs.foxHuntFmMelody || 'true' }}"
          CW_TONE="${{ github.event.inputs.foxHuntCwTone || 'false' }}"
          MORSE_MARKER="${{ github.event.inputs.foxHuntMorseMarker || 'true' }}"
          MORSE_MSG="${{ github.event.inputs.foxMorseMsg || 'N0CALL N0CALL FOX' }}"
          LOW_VOLT_MARKER="${{ github.event.inputs.foxHuntLowVoltageAdditionalMarker || 'true' }}"
          MORSE_MSG_VBAT="${{ github.event.inputs.foxMorseMsgVbat || 'N0CALL LOW BATTERY' }}"
          FREQ="${{ github.event.inputs.foxHuntFrequency || '434.5' }}"
          DELAY="${{ github.event.inputs.foxHuntTransmissionDelay || '0' }}"
          POWER="${{ github.event.inputs.foxHuntRadioPower || '5' }}"

          echo "=== Modifying CONFIG.h values ==="
          # Replace booleans using precise match configurations
          sed -i "s/\(constexpr bool foxHuntMode\s*=\).*/\1 $FOX_MODE;/g" $CONFIG_FILE
          sed -i "s/\(constexpr bool foxHuntSecondaryMode\s*=\).*/\1 $FOX_SECOND_MODE;/g" $CONFIG_FILE
          sed -i "s/\(constexpr bool foxHuntFmMelody\s*=\).*/\1 $FM_MELODY;/g" $CONFIG_FILE
          sed -i "s/\(constexpr bool foxHuntCwTone\s*=\).*/\1 $CW_TONE;/g" $CONFIG_FILE
          sed -i "s/\(constexpr bool foxHuntMorseMarker\s*=\).*/\1 $MORSE_MARKER;/g" $CONFIG_FILE
          sed -i "s/\(constexpr bool foxHuntLowVoltageAdditionalMarker\s*=\).*/\1 $LOW_VOLT_MARKER;/g" $CONFIG_FILE
          
          # Replace exact string variables (fixes the overlap issue)
          sed -i "s/\(String foxMorseMsg\s*=\).*/\1 \"$MORSE_MSG\";/g" $CONFIG_FILE
          sed -i "s/\(String foxMorseMsgVbat\s*=\).*/\1 \"$MORSE_MSG_VBAT\";/g" $CONFIG_FILE
          
          # Replace numeric settings
          sed -i "s/\(constexpr float\s\+foxHuntFrequency\s*=\).*/\1 $FREQ;/g" $CONFIG_FILE
          sed -i "s/\(constexpr uint16_t foxHuntTransmissionDelay\s*=\).*/\1 $DELAY;/g" $CONFIG_FILE
          sed -i "s/\(constexpr int8_t\s\+foxHuntRadioPower\s*=\).*/\1 $POWER;/g" $CONFIG_FILE
          
          echo "=== Verification of Modified Lines ==="
          grep -E "foxHuntMode|foxHuntFmMelody|foxHuntCwTone|foxHuntMorseMarker|foxMorseMsg|foxHuntLowVoltageAdditionalMarker|foxHuntFrequency|foxHuntTransmissionDelay|foxHuntRadioPower" $CONFIG_FILE

      - name: Map Code Parameters
        id: configure
        run: |
          # Use choice from dropdown if triggered manually, otherwise fall back to RSM4x4
          PLATFORM="${{ github.event.inputs.pcb_model || 'RSM4x4' }}"
          
          if [ "$PLATFORM" = "RSM4x4" ]; then
            FQBN="STMicroelectronics:stm32:GenL4:pnum=GENERIC_L412RBTXP,opt=osstd"
          else
            FQBN="STMicroelectronics:stm32:GenF1:pnum=GENERIC_F100C8TX,opt=oslto"
          fi
          
          echo "target_fqbn=$FQBN" >> $GITHUB_OUTPUT
          echo "target_flag=-D$PLATFORM" >> $GITHUB_OUTPUT
  
      - name: Compile Firmware
        run: |
          mkdir -p ./output_bin
          arduino-cli compile --fqbn "${{ steps.configure.outputs.target_fqbn }}" \
            --build-property "compiler.cpp.extra_flags=${{ steps.configure.outputs.target_flag }}" \
            --output-dir ./output_bin \
            ./rs41-nfw_sonde-firmware/rs41-nfw_sonde-firmware.ino

      - name: Get Current Date and Time
        id: datetime
        run: |
          # Generates a clean timestamp (e.g., 2026-06-16_15-46)
          echo "timestamp=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: Rename Compiled Binaries
        run: |
          # Fallback values for automatic push/PR triggers
          MODE="${{ github.event.inputs.foxHuntSecondaryMode || 'false' }}"
          PLATFORM="${{ github.event.inputs.pcb_platform || 'RSM4x4' }}"
          FREQ="${{ github.event.inputs.foxHuntFrequency || '434.5' }}"
          POWER="${{ github.event.inputs.foxHuntRadioPower || '5' }}"
          TIMESTAMP="${{ steps.datetime.outputs.timestamp }}"
          
          if [ "$MODE" = "true" ]; then
              MODE="V2-TX"
          else
              MODE="default"
          fi

          # Clean up any potential spaces or trailing dots in frequency strings for filename safety
          CLEAN_FREQ=$(echo "$FREQ" | sed 's/[^0-9.]//g')
          
          echo "=== Renaming target .bin files ==="
          cd ./output_bin
          for f in *.bin; do
            if [ -f "$f" ]; then
              # Formats file to: rs41-nfw-RSM4x4-434.5-5dBm-2026-06-16_15-46.bin
              NEW_NAME="rs41-nfw-${MODE}-${PLATFORM}-${CLEAN_FREQ}MHz-${POWER}_PwrLvl-${TIMESTAMP}.bin"
              mv "$f" "$NEW_NAME"
              echo "Renamed $f to $NEW_NAME"
            fi
          done

      - name: Upload Finished Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rs41-nfw-firmware-${{ github.event.inputs.pcb_model }}-${{ github.event.inputs.foxHuntFrequency }}-${{ github.event.inputs.foxHuntRadioPower }}-${{ steps.datetime.outputs.timestamp }}
          path: ./output_bin/*.bin
          if-no-files-found: error
